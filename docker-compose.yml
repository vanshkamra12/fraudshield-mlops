# FraudShield — full local stack
# Start everything: docker-compose up -d
# Stop everything:  docker-compose down
# Wipe all data:    docker-compose down -v

services:

  # ─────────────────────────────────────────
  # KAFKA  (KRaft mode — no Zookeeper needed)
  # ─────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.1
    container_name: fraudshield-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    mem_limit: 512m
    networks:
      - fraudshield-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────
  # REDIS  (feature cache — sub-ms lookups)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fraudshield-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    mem_limit: 256m
    networks:
      - fraudshield-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # POSTGRESQL  (shared — 3 databases)
  #   fraudshield → predictions + labels
  #   mlflow      → experiment metadata
  #   airflow     → DAG run history
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: fraudshield-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fraudshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fraudshield123}
      POSTGRES_DB: fraudshield
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    mem_limit: 512m
    networks:
      - fraudshield-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fraudshield}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MINIO  (free S3 — MLflow artifact store)
  #   UI:  http://localhost:9001
  #   API: http://localhost:9000
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: fraudshield-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    mem_limit: 512m
    networks:
      - fraudshield-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MINIO INIT  (creates mlflow-artifacts bucket on first run)
  # ─────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: fraudshield-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_USER:-minioadmin} ${MINIO_PASSWORD:-minioadmin123};
        mc mb --ignore-existing local/mlflow-artifacts;
        echo 'Bucket ready.';
      "
    networks:
      - fraudshield-net

  # ─────────────────────────────────────────
  # MLFLOW  (experiment tracking + model registry)
  #   UI: http://localhost:5001
  # ─────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.1.0
    container_name: fraudshield-mlflow
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "5001:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD:-minioadmin123}
    command: >
      bash -c "pip install psycopg2-binary boto3 -q &&
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-fraudshield}:${POSTGRES_PASSWORD:-fraudshield123}@postgres:5432/mlflow
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000"
    mem_limit: 512m
    networks:
      - fraudshield-net

  # ─────────────────────────────────────────
  # FASTAPI  (real-time scoring service)
  #   API: http://localhost:8000
  # ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/api/Dockerfile
    container_name: fraudshield-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fraudshield}:${POSTGRES_PASSWORD:-fraudshield123}@postgres:5432/fraudshield
      FEATURE_PIPELINE_PATH: /app/models/feature_pipeline.joblib
      MODEL_PATH: /app/models/lgbm_model.txt
    volumes:
      - ./models:/app/models:ro
    mem_limit: 1g
    networks:
      - fraudshield-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────
  # KAFKA CONSUMER  (scores transactions from stream)
  # ─────────────────────────────────────────
  consumer:
    build:
      context: .
      dockerfile: infra/api/Dockerfile
    container_name: fraudshield-consumer
    depends_on:
      kafka:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fraudshield}:${POSTGRES_PASSWORD:-fraudshield123}@postgres:5432/fraudshield
      FEATURE_PIPELINE_PATH: /app/models/feature_pipeline.joblib
      MODEL_PATH: /app/models/lgbm_model.txt
    volumes:
      - ./models:/app/models:ro
    command: python -m src.ingestion.consumer --broker kafka:9092 --api http://api:8000
    mem_limit: 512m
    restart: on-failure
    networks:
      - fraudshield-net

  # ─────────────────────────────────────────
  # AIRFLOW  (retraining pipeline scheduler)
  #   UI: http://localhost:8080
  #   user: admin / password: admin
  # ─────────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.8.1
    container_name: fraudshield-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-fraudshield}:${POSTGRES_PASSWORD:-fraudshield123}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@fraudshield.local"
    networks:
      - fraudshield-net

  airflow-webserver:
    image: apache/airflow:2.8.1
    container_name: fraudshield-airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-fraudshield}:${POSTGRES_PASSWORD:-fraudshield123}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./src/orchestration:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: webserver
    mem_limit: 1g
    networks:
      - fraudshield-net
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    image: apache/airflow:2.8.1
    container_name: fraudshield-airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-fraudshield}:${POSTGRES_PASSWORD:-fraudshield123}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./src/orchestration:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    mem_limit: 1g
    networks:
      - fraudshield-net

  # ─────────────────────────────────────────
  # PROMETHEUS  (metrics collector)
  #   UI: http://localhost:9090
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: fraudshield-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    mem_limit: 256m
    networks:
      - fraudshield-net

  # ─────────────────────────────────────────
  # GRAFANA  (dashboards)
  #   UI: http://localhost:3000
  #   user: admin / password: admin
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.0
    container_name: fraudshield-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
    mem_limit: 256m
    networks:
      - fraudshield-net

# ─────────────────────────────────────────
networks:
  fraudshield-net:
    driver: bridge

volumes:
  kafka_data:
  redis_data:
  postgres_data:
  minio_data:
  airflow_logs:
  prometheus_data:
  grafana_data:
